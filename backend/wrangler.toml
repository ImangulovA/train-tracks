# Cloudflare Worker config for the daily_github_game global-stats backend.
# Rename `name` per fork, create a D1 DB, and paste its id below.

name = "train-tracks-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# CORS allowlist (comma-separated). Origin is scheme+host only (no path), so one
# entry covers every GitHub Pages project under the user. Plus localhost ports.
[vars]
ALLOWED_ORIGINS = "https://imangulova.github.io,http://localhost:5173,http://localhost:5174,http://localhost:4173"

# Created with: wrangler d1 create train-tracks-stats
[[d1_databases]]
binding = "DB"
database_name = "train-tracks-stats"
database_id = "5f8cf79b-2500-4361-bcc1-3d558c8c34ce"
