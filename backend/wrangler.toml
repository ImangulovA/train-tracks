# Cloudflare Worker config for the daily_github_game global-stats backend.
# Rename `name` per fork, create a D1 DB, and paste its id below.

name = "daily-game-stats"
main = "src/index.js"
compatibility_date = "2024-11-01"

# CORS allowlist (comma-separated). Include your GitHub Pages origin + localhost
# dev ports. Leave empty to reflect any Origin (handy while testing).
[vars]
ALLOWED_ORIGINS = "https://YOURUSER.github.io,http://localhost:5173,http://localhost:4173"

# Create with: wrangler d1 create daily-game-stats
# then paste the printed database_id here.
[[d1_databases]]
binding = "DB"
database_name = "daily-game-stats"
database_id = "PASTE_D1_DATABASE_ID_HERE"
